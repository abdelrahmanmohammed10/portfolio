<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    .logo-bg { fill: none; }
    .logo-lines {
      stroke: #2ec4b6;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.9;
    }
    .logo-orbit {
      stroke: #7c3aed;
      stroke-width: 1.5;
      stroke-linecap: round;
      opacity: 0.7;
    }
    .logo-star-outer {
      fill: #ff9f1c;
      opacity: 0.85;
    }
    .logo-star-inner {
      fill: #ffffff;
    }
    /* Standalone prefers-color-scheme styling for favicon / direct preview */
    @media (prefers-color-scheme: light) {
      .logo-lines { stroke: #08665c; }
      .logo-orbit { stroke: #5b21b6; }
      .logo-star-outer { fill: #7a5100; }
    }
  </style>
  <rect width="100" height="100" class="logo-bg" />
  <!-- Orbit Ring -->
  <path d="M 15 68 C 20 80, 80 80, 85 58 C 90 40, 50 35, 20 48" 
        fill="none" 
        class="logo-orbit" />
  <!-- Connecting Lines -->
  <path d="M 22 82 L 36 50 L 50 18 L 64 50 L 78 82 M 36 50 L 64 50" 
        fill="none" 
        class="logo-lines" />
  <!-- Stars / Nodes -->
  <!-- Bottom Left Star -->
  <g transform="translate(22, 82)">
    <circle r="4" class="logo-star-outer" />
    <circle r="1.5" class="logo-star-inner" />
  </g>
  <!-- Mid Left Star -->
  <g transform="translate(36, 50)">
    <circle r="3.5" class="logo-star-outer" />
    <circle r="1.2" class="logo-star-inner" />
  </g>
  <!-- Apex Star -->
  <g transform="translate(50, 18)">
    <circle r="5" class="logo-star-outer" />
    <circle r="2" class="logo-star-inner" />
  </g>
  <!-- Mid Right Star -->
  <g transform="translate(64, 50)">
    <circle r="3.5" class="logo-star-outer" />
    <circle r="1.2" class="logo-star-inner" />
  </g>
  <!-- Bottom Right Star -->
  <g transform="translate(78, 82)">
    <circle r="4" class="logo-star-outer" />
    <circle r="1.5" class="logo-star-inner" />
  </g>
</svg>
